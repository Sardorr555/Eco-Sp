<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map & Analysis - Sputnik Eco</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <!-- Яндекс Карты API -->
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=b259740a-ffbd-477d-b570-fc2b6bb7bc7f"
        type="text/javascript"></script>
    <style>
        body {
            overflow: hidden;
        }

        .map-layout {
            display: flex;
            height: 100vh;
            margin-left: 240px;
        }

        .map-sidebar {
            width: 380px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow-y: auto;
        }

        #map {
            flex: 1;
            height: 100%;
            background: #080d1a;
            z-index: 1;
            width: 100%;
            position: relative;
        }

        .panel-section {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .territory-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .territory-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface-2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .territory-item:hover,
        .territory-item.active {
            border-color: var(--accent);
        }

        .territory-item .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
        }

        .territory-item .name {
            font-weight: 500;
            font-size: 14px;
            flex: 1;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .territory-item .score {
            font-size: 12px;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(8, 13, 26, 0.8);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: var(--surface);
            padding: 32px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .empty-state {
            padding: 32px 0;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
        }

        .skeleton {
            background: var(--surface-2);
            border-radius: 4px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 0.6;
            }
        }

        /* Yandex maps dark theme fixes */
        .ymaps-2-1-79-ground-pane {
            filter: invert(90%) hue-rotate(180deg) brightness(85%) contrast(110%);
        }
    </style>
</head>

<body>
    <div class="map-layout">
        <div class="map-sidebar">
            <div class="panel-section">
                <div class="panel-title">
                    My Territories
                    <button class="btn btn-ghost" style="padding: 4px 8px; font-size: 12px;" id="btnDrawNew">+
                        New</button>
                </div>
                <div class="territory-list" id="territoryList">
                    <div class="empty-state" id="territoryEmpty" style="display: none;">No territories yet. Draw one on
                        the map!</div>
                </div>
            </div>

            <div class="panel-section" id="analysisFormPanel" style="display: none;">
                <div class="panel-title">Run Analysis</div>
                <form id="analysisForm">
                    <input type="hidden" id="selectTerritoryId">
                    <div style="margin-bottom: 16px;">
                        <span style="font-size: 18px; font-weight: 600;" id="selectTerritoryName">Territory Name</span>
                    </div>
                    <div class="grid grid-2" style="margin-bottom: 16px;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Date From</label>
                            <input type="date" id="dateFrom" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Date To</label>
                            <input type="date" id="dateTo" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;" id="btnAnalyze">Analyze
                        Territory</button>
                </form>
            </div>

            <div class="panel-section" id="resultsPanel" style="display: none; flex: 1; padding-bottom: 40px;">
                <div class="panel-title">Results</div>

                <div id="results-panel" style="display:none">
                    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
                        <div id="resScoreCircle" class="score-badge score-good">--</div>
                        <div>
                            <div style="font-size:20px;font-weight:600" id="resLabel">—</div>
                            <div style="font-size:13px;color:var(--muted)" id="score-period">—</div>
                        </div>
                    </div>

                    <div id="pollutants-list" style="margin-bottom: 24px;">
                        <div class="pollutant-row">
                            <span style="width: 60px; cursor: help;"
                                title="PM2.5: Fine particulate matter (< 2.5 µm). Sources: exhausts, smoke. Impact: Severe lung and heart diseases.">PM2.5
                                ℹ️</span>
                            <span style="width: 50px; font-weight: 600;" id="resPM25">0</span>
                            <div class="pollutant-bar-wrap">
                                <div class="pollutant-bar" id="barPM25"></div>
                            </div>
                            <span style="width: 60px; text-align: right; font-size: 12px;" id="tagPM25"></span>
                        </div>
                        <div class="pollutant-row">
                            <span style="width: 60px; cursor: help;"
                                title="PM10: Coarse particulate matter (< 10 µm). Sources: dust, pollen. Impact: Irritates upper respiratory tract.">PM10
                                ℹ️</span>
                            <span style="width: 50px; font-weight: 600;" id="resPM10">0</span>
                            <div class="pollutant-bar-wrap">
                                <div class="pollutant-bar" id="barPM10"></div>
                            </div>
                            <span style="width: 60px; text-align: right; font-size: 12px;" id="tagPM10"></span>
                        </div>
                        <div class="pollutant-row">
                            <span style="width: 60px; cursor: help;"
                                title="NO2: Nitrogen Dioxide. Sources: car engines, factories. Impact: Airway inflammation, cough, asthma.">NO₂
                                ℹ️</span>
                            <span style="width: 50px; font-weight: 600;" id="resNO2">0</span>
                            <div class="pollutant-bar-wrap">
                                <div class="pollutant-bar" id="barNO2"></div>
                            </div>
                            <span style="width: 60px; text-align: right; font-size: 12px;" id="tagNO2"></span>
                        </div>
                        <div class="pollutant-row">
                            <span style="width: 60px; cursor: help;"
                                title="SO2: Sulfur Dioxide. Sources: coal/oil burning. Impact: Eye irritation, worsens asthma.">SO₂
                                ℹ️</span>
                            <span style="width: 50px; font-weight: 600;" id="resSO2">0</span>
                            <div class="pollutant-bar-wrap">
                                <div class="pollutant-bar" id="barSO2"></div>
                            </div>
                            <span style="width: 60px; text-align: right; font-size: 12px;" id="tagSO2"></span>
                        </div>
                        <div class="pollutant-row">
                            <span style="width: 60px; cursor: help;"
                                title="CO: Carbon Monoxide. Sources: incomplete burning of fuels. Impact: Reduces oxygen delivery to organs, fatigue.">CO
                                ℹ️</span>
                            <span style="width: 50px; font-weight: 600;" id="resCO">0</span>
                            <div class="pollutant-bar-wrap">
                                <div class="pollutant-bar" id="barCO"></div>
                            </div>
                            <span style="width: 60px; text-align: right; font-size: 12px;" id="tagCO"></span>
                        </div>
                        <div class="pollutant-row">
                            <span style="width: 60px; cursor: help;"
                                title="O3: Ground-level Ozone. Sources: smog, chemical reactions in sunlight. Impact: Breathing problems, reduced lung function.">O₃
                                ℹ️</span>
                            <span style="width: 50px; font-weight: 600;" id="resO3">0</span>
                            <div class="pollutant-bar-wrap">
                                <div class="pollutant-bar" id="barO3"></div>
                            </div>
                            <span style="width: 60px; text-align: right; font-size: 12px;" id="tagO3"></span>
                        </div>
                    </div>

                    <div id="ai-analysis-container" style="margin-top:8px"></div>

                    <button class="btn btn-ghost" style="width:100%;margin-top:20px" id="btnSaveReport">
                        Save as PDF Report
                    </button>
                </div>
            </div>
        </div>

        <div id="map">
            <!-- Modal overlays inside map so it covers the whole screen -->
            <div class="modal-overlay" id="nameModal">
                <div class="modal">
                    <h3 style="margin-bottom: 16px;">Name this territory</h3>
                    <div class="form-group">
                        <input type="text" id="newTerritoryName" placeholder="e.g. Factory Site A" required>
                    </div>
                    <div class="grid grid-2">
                        <button class="btn btn-ghost" id="btnCancelName">Cancel</button>
                        <button class="btn btn-primary" id="btnSaveName">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/app/js/api.js?v=6"></script>
    <script src="/app/js/map.js?v=6"></script>
</body>

</html>
