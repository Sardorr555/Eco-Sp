<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Sputnik Eco</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>

<body>
    <div class="main">
        <div class="page-header">
            <div>
                <h1>Account Settings</h1>
                <p style="color: var(--muted);">Manage your profile and subscription</p>
            </div>
        </div>

        <div class="grid grid-2" style="max-width: 900px;">
            <!-- Profile Info Settings -->
            <div class="card" style="padding: 32px;">
                <h3 style="margin-bottom: 24px; font-size: 18px;">Profile Information</h3>
                <form id="settingsForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="set-email" disabled
                            style="background: rgba(255,255,255,0.05); color: #7a8ba0;">
                        <span style="font-size: 12px; color: var(--muted); display: block; margin-top: 6px;">Email
                            address cannot be changed.</span>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="set-name" required>
                    </div>
                    <div class="form-group">
                        <label>Company / Organization</label>
                        <input type="text" id="set-company">
                    </div>
                    <div class="form-group" style="margin-top: 24px;">
                        <label>Language / Тил</label>
                        <select id="set-lang"
                            style="width: 100%; padding: 12px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); font-size: 14px;">
                            <option value="en">English</option>
                            <option value="uz">Ўзбекча (Кирилл)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" id="btnSaveSettings" style="margin-top: 16px;">Save
                        Changes</button>
                </form>
            </div>

            <!-- Subscription Settings -->
            <div class="card" style="padding: 32px; display: flex; flex-direction: column;">
                <h3 style="margin-bottom: 24px; font-size: 18px;">Subscription Plan</h3>

                <div
                    style="background: rgba(0, 201, 167, 0.1); border: 1px solid var(--success); border-radius: var(--radius); padding: 24px; text-align: center; margin-bottom: 24px;">
                    <div style="color: var(--success); font-weight: 700; font-size: 24px; text-transform: uppercase;"
                        id="planBadge">FREE PLAN</div>
                    <p style="color: var(--muted); margin-top: 8px; font-size: 14px;">You are currently using the Free
                        tier.</p>
                </div>

                <div style="margin-top: auto;">
                    <h4 style="margin-bottom: 12px; color: var(--text);">Pro Plan includes:</h4>
                    <ul style="list-style: none; color: var(--muted); font-size: 14px; margin-bottom: 24px;">
                        <li style="margin-bottom: 8px;">✓ Unlimited AI Analyses</li>
                        <li style="margin-bottom: 8px;">✓ Custom PDF Branding</li>
                        <li style="margin-bottom: 8px;">✓ Automatic daily territory scans</li>
                    </ul>
                    <button class="btn btn-ghost"
                        style="width: 100%; border: 1px solid var(--accent); color: var(--accent);">Upgrade to
                        Pro</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/app/js/api.js"></script>
    <script src="/app/js/settings.js"></script>
</body>

</html>
