<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sputnik Eco - Login</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
            font-size: 24px;
            font-weight: 600;
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="card auth-card">
        <div class="auth-logo">Sputnik Eco</div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Login</button>
        </form>
        <div style="text-align: center; margin-top: 24px; font-size: 14px;">
            <span style="color: var(--muted);">Don't have an account?</span> <a href="/app/register.html"
                style="color: var(--accent); text-decoration: none;">Register</a>
        </div>
    </div>
    <script src="/app/js/api.js"></script>
    <script src="/app/js/auth.js"></script>
</body>

</html>
